<!DOCTYPE html>
<html lang="en">

<head>
	<script src="./dist/themeLoad.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/default.min.css">
	<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
	<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/powershell.min.js"></script>
	<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/nginx.min.js"></script>
	<script type="module" src="./dist/main.js"></script>
	<script type="module" src="./dist/rss.js"></script>
	<script type="module" src="./dist/visitLogger.js"></script>
	<script type="module">
		import { renderVisits } from "./dist/visits.js";

		void renderVisits({
			scope: "page",
			metric: "uniqueVisitors",
			target: "unique-visits-count"
		});
	</script>
	<title>Kitty's Resources</title>
	<link id="theme-stylesheet" rel="stylesheet" href="/styles/styles.css">
	<link rel="stylesheet" href="/styles/modules/calendar.css">
</head>

<body>
	<div class="frame">
		<div class="frame-content">
			<aside id="shell-wrapper" role="presentation" aria-hidden="true" style="width: auto;">
				<div id="terminal-wrapper">
					<div id="terminal-loading">Loading terminal...</div>
					<div id="terminal"></div>
				</div>
			</aside>
			<nav id="main-menu"></nav>
			<header id="main-header">Resources built by me</header>

			<div class="blog-wrapper" id="resources-wrapper">
				<a class="comments-header" style="display: block; text-align: left;"></a>
				<div id="kc-blog-cal-filter" class="blog-cal-slot" aria-label="Blog date filters"></div>
				<div class="blog-container"></div>
			</div>

			<div class="site-stats kc-88by31">
				<div class="segment-header">Stats</div>
				<div class="site-stats__item">
					<span class="stats-segment">Unique Visitors</span>
					<div class="site-stats__counter" id="unique-visits-count"></div>
				</div>
			</div>
		</div>

		<footer id="main-footer"></footer>
	</div>
</body>

</html>
