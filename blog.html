<!DOCTYPE html>
<html lang="en">

<head>
  <script src="./dist/themeLoad.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="./dist/main.js"></script>
  <script type="module" src="./dist/rss.js"></script>
  <script type="module">
    import { renderVisits } from "./dist/visits.js";

    void renderVisits({
      scope: "page",
      metric: "uniqueVisitors",
      target: "unique-visits-count"
    });
  </script>
  <title>Kitty Crypto Blog</title>
  <link id="theme-stylesheet" rel="stylesheet" href="/styles/styles.css">
</head>

<body>
  <div class="frame">
    <div class="frame-content">
      <aside id="banner-wrapper" role="presentation" aria-hidden="true">
        <img id="term-icon" />
        <div id="terminal-wrapper">
          <div id="terminal-loading">Loading terminal...</div>
          <div id="terminal"></div>
          <div id="banner"></div>
        </div>
      </aside>

      <nav id="main-menu"></nav>
      <header id="main-header">Kitty's Blog</header>

      <div id="main-content">
        <div class="blog-wrapper">
          <a class="comments-header" style="display: block; text-align: left;">Blog Posts</a>
          <div class="blog-container"></div>
        </div>
        <div class="site-stats kc-88by31">
          <div class="comments-header">Stats</div>

          <div class="site-stats__item">
            <span class="stats-segment">Unique Visitors</span>
            <div id="unique-visits-count"></div>
          </div>
        </div>

        <footer id="main-footer"></footer>
      </div>
    </div>
  </div>
</body>

</html>
