<!DOCTYPE html>
<html lang="en">

<head>
    <script src="./dist/themeLoad.js"></script>
    <script type="module" src="./dist/main.js"></script>
    <script type="module" src="./dist/chat.js"></script>
    <script type="module" src="./dist/message.js"></script>
    <script type="module" src="./dist/visitLogger.js"></script>
    <title>Kitty Crypto Chat</title>
    <link id="theme-stylesheet" rel="stylesheet" href="/styles/styles.css">
</head>

<body>
    <div class="frame frame-chat">
        <div class="frame-content">
            <aside id="shell-wrapper" role="presentation" aria-hidden="true" style="width: auto;">
                <div id="terminal-wrapper">
                    <div id="terminal-loading">Loading terminal...</div>
                    <div id="terminal"></div>
                </div>
            </aside>
            <nav id="main-menu"></nav>
            <header id="main-header">Kitty Crypto Chat</header>
            <main id="main-content">
                <div id="chat-window">
                    <div id="chatroom"></div>
                    <div class="chat-inputs">
                        <input type="text" id="nickname" placeholder="Enter your nickname">
                        <input type="text" id="message" placeholder="Type your message here">
                        <button id="send-button">Send</button>
                    </div>
                </div>
            </main>
        </div>
        <footer id="main-footer"></footer>
    </div>
</body>

</html>
